services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hieu-portfolio
    ports:
      - "80:80"
    # No ports mapping - Coolify's Traefik handles external routing
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
